---
services:
  database:
    image: postgres:16.6
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    # Fixed host port for local `make up` (override with WSS_DB_PORT). `make check` sets
    # WSS_DB_PORT=0 so the isolated test stack gets an ephemeral port and never collides.
    ports: ['${WSS_DB_PORT:-5432}:5432']
    volumes:
      - ./.docker-compose/database/01-init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: echo 'select 1' | psql -h localhost -U postgres  | grep -q '1 row'
      interval: 3s
      retries: 10
      timeout: 3s
  flyway:
    image: flyway/flyway
    volumes: [./schema/:/flyway/sql]
    command: >
      -locations=filesystem:/flyway/sql
      -connectRetries=60
      -user=postgres
      -password=postgres
      -url=jdbc:postgresql://database:5432/wnc_helene
      migrate
    depends_on:
      database:
        condition: service_healthy
  app:
    # Must match the build toolchain (Java 21); the jar is compiled with --enable-preview, whose
    # class files are locked to their exact JDK major version and will not run on a newer runtime.
    image: azul/zulu-openjdk:21-latest
    volumes: [./webapp/build/libs/:/build/]
    command: >
      java --enable-preview -jar /build/supplies-database.jar
    # Fixed host port for local `make up` (override with WSS_APP_PORT). `make check` sets
    # WSS_APP_PORT=0 for an ephemeral port.
    ports: ['${WSS_APP_PORT:-8080}:8080']
    depends_on:
      flyway:
        condition: service_completed_successfully
    environment:
      - DB_URL=database:5432
      - WEBHOOK_SECRET=secret
      - DB_NAME=wnc_helene
