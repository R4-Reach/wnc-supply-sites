# When master is updated, runs a docker build
# and pushes a docker image to Github registry
name: Build Main and Deploy
on:
  push:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7
      - name: Set up JDK 23
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 23
      - name: Run Tests
        run: make check
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v1
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: build docker container
        run: |
          docker build schema/ --tag ghcr.io/r4-reach/wnc-supply-sites/flyway:latest
          docker push ghcr.io/r4-reach/wnc-supply-sites/flyway:latest

          cd webapp;

          ./gradlew clean bootJar
          docker build . --tag ghcr.io/r4-reach/wnc-supply-sites/webapp:latest
          docker push ghcr.io/r4-reach/wnc-supply-sites/webapp:latest
  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
      - name: Load SSH private key into ssh-agent
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.DEPLOY_USER_PRIVATE_SSH_KEY }}
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.12"
      - name: Cache Ansible Galaxy collections
        uses: actions/cache@v4
        with:
          path: ~/.ansible/collections
          key: ansible-collections-${{ hashFiles('deploy/ansible/requirements.yml') }}
      - name: Install Ansible and dependencies
        run: |
          uv tool install --with linode_api4 --with-executables-from ansible-core,ansible-lint ansible
          ansible-galaxy collection install -r deploy/ansible/requirements.yml
      - name: Deploy
        env:
          R4_LINODE_TOKEN: ${{ secrets.R4_LINODE_TOKEN }}
        run: SSH_USER=deploy make deploy
